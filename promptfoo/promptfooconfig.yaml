description: Gymsense gym environment prompt evaluation

prompts:
  - file://gym_environment_prompt.txt

providers:
  - id: ollama:chat:phi3:mini
    config:
      temperature: 0.2

tests:
  - description: Normal gym conditions
    vars:
      temperature: 22
      humidity: 45
      pressure: 1024
      gasResistance: 50000
      airQuality: Good
    assert:
      - type: contains
        value: "Risk level"
      - type: not-contains
        value: "emergency"
      - type: not-contains
        value: "heatstroke"

  - description: Warm gym should be comfort issue, not emergency
    vars:
      temperature: 26.5
      humidity: 55
      pressure: 1024
      gasResistance: 35000
      airQuality: Moderate
    assert:
      - type: not-contains
        value: "emergency"
      - type: not-contains
        value: "danger"
      - type: contains
        value: "Recommendation"

  - description: High humidity should recommend ventilation
    vars:
      temperature: 23
      humidity: 65
      pressure: 1024
      gasResistance: 30000
      airQuality: Moderate
    assert:
      - type: contains
        value: "ventilation"
      - type: not-contains
        value: "emergency"
      - type: not-contains
        value: "danger"

  - description: Poor air quality should recommend ventilation but not danger
    vars:
      temperature: 22
      humidity: 50
      pressure: 1024
      gasResistance: 12000
      airQuality: Poor
    assert:
      - type: contains
        value: "ventilation"
      - type: not-contains
        value: "emergency"
      - type: not-contains
        value: "danger"

  - description: Invalid sensor data should be treated as sensor error
    vars:
      temperature: 182
      humidity: 100
      pressure: -172
      gasResistance: 1000
      airQuality: Poor
    assert:
      - type: contains-any
        value:
          - "sensor"
          - "invalid"
          - "check"
      - type: not-contains
        value: "Extreme Danger"
      - type: not-contains
        value: "heatstroke"